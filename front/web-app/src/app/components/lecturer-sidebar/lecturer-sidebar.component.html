<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
<div [class.sidebar]="true" [class.collapsed]="collapsed">

  <div class="sidebar-top">
    <div class="logo">
        <span *ngIf="!collapsed">Platform Learning</span>
    </div>
    <button class="toggle-btn" (click)="toggleSidebar()">
      <i class="fas fa-bars"></i>
    </button>
  </div>

  <div class="sidebar-menu-wrapper"> 
    <ul class="menu">
        <li (click)="navigate('/lecturer/lecturerDashboard')">
        <i class="fas fa-home"></i>
        <span *ngIf="!collapsed">Dashboard</span>
        </li>
        <li (click)="navigate('/lecturer/courses')">
          <i class="fas fa-book-open"></i>
          <span *ngIf="!collapsed">Courses</span>
        </li>
        <li (click)="navigate('/lecturer/profile')">
          <i class="fas fa-user"></i>
          <span *ngIf="!collapsed">Profile</span>
        </li>
    </ul>
   </div>
  <div class="sidebar-bottom">
    <button class="logout-btn" (click)="logout()">
      <i class="fas fa-sign-out-alt"></i>
      <span *ngIf="!collapsed">Logout</span>
    </button>
  </div>

</div>
